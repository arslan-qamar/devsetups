---
- name: Ensure PostgreSQL packages are {{ state }}
  apt:
    name: "{{ ['postgresql', 'postgis', 'postgresql-postgis'] if state == 'present' else ['postgresql', 'postgresql-[0-9]*', 'postgis', 'postgresql-postgis', 'postgresql-[0-9]*-postgis-3'] }}"
    state: "{{ state }}"
    update_cache: "{{ state == 'present' }}"
    purge: no
  become: yes

- name: Gather PostgreSQL data directories before removal
  shell: find /var/lib/postgresql -mindepth 2 -maxdepth 2 -type d | sort
  register: postgres_data_directories_before_removal
  changed_when: false
  failed_when: false
  become: yes
  when: state == 'absent'

- name: Gather PostgreSQL service facts before removal
  service_facts:
  when: state == 'absent'

- name: Ensure PostgreSQL service is stopped before removal
  service:
    name: postgresql
    state: stopped
    enabled: no
  become: yes
  when:
    - state == 'absent'
    - "'postgresql.service' in ansible_facts.services"

- name: Gather PostgreSQL clusters
  command: pg_lsclusters --no-header
  register: postgres_clusters_before_start
  changed_when: false
  failed_when: false
  become: yes
  when: state == 'present'

- name: Detect installed PostgreSQL versions
  shell: find /usr/lib/postgresql -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort -V
  register: postgres_installed_versions
  changed_when: false
  become: yes
  when:
    - state == 'present'
    - postgres_clusters_before_start.stdout_lines | length == 0

- name: Ensure PostgreSQL version is available for cluster creation
  assert:
    that:
      - postgres_installed_versions.stdout_lines | length > 0
    fail_msg: >-
      PostgreSQL packages were installed, but no PostgreSQL version directory was found under /usr/lib/postgresql.
  when:
    - state == 'present'
    - postgres_clusters_before_start.stdout_lines | length == 0

- name: Create default PostgreSQL cluster
  command: pg_createcluster {{ postgres_installed_versions.stdout_lines | last }} main --start
  become: yes
  when:
    - state == 'present'
    - postgres_clusters_before_start.stdout_lines | length == 0

- name: Ensure PostgreSQL service is started
  service:
    name: postgresql
    state: started
    enabled: yes
  become: yes
  when: state == 'present'

- name: Gather PostgreSQL clusters after startup
  command: pg_lsclusters --no-header
  register: postgres_clusters_after_start
  changed_when: false
  failed_when: false
  become: yes
  when: state == 'present'

- name: Gather online PostgreSQL clusters after startup
  shell: pg_lsclusters --no-header | awk '$4 == "online" { print }'
  register: postgres_online_clusters_after_start
  changed_when: false
  failed_when: false
  become: yes
  when: state == 'present'

- name: Ensure PostgreSQL cluster is online
  vars:
    postgres_cluster_lines: >-
      {{
        postgres_clusters_after_start.stdout_lines
        | list
      }}
  assert:
    that:
      - "postgres_cluster_lines | length > 0"
      - "postgres_online_clusters_after_start.stdout_lines | length > 0"
    fail_msg: >-
      PostgreSQL packages were installed, but no online PostgreSQL cluster was found.
      Detected clusters: {{ postgres_cluster_lines }}
    success_msg: >-
      Online PostgreSQL clusters: {{ postgres_online_clusters_after_start.stdout_lines | join(', ') }}
  when: state == 'present'

- name: Gather PostgreSQL cluster versions for PostGIS packages
  set_fact:
    postgres_cluster_versions: >-
      {{
        postgres_clusters_after_start.stdout_lines
        | map('split')
        | map('first')
        | unique
        | list
      }}
  when: state == 'present'

- name: Ensure PostGIS packages are installed for PostgreSQL cluster versions
  apt:
    name: "postgresql-{{ item }}-postgis-3"
    state: present
  loop: "{{ postgres_cluster_versions }}"
  become: yes
  when:
    - state == 'present'
    - postgres_cluster_versions | length > 0

- name: Prompt for PostgreSQL password when requested
  pause:
    prompt: Enter password for postgres database user
    echo: no
  register: postgres_password_prompt_result
  no_log: true
  when:
    - state == 'present'
    - postgres_prompt_for_password | bool
    - postgres_password | length == 0

- name: Resolve PostgreSQL password input
  set_fact:
    postgres_effective_password: >-
      {{
        postgres_password
        if postgres_password | length > 0
        else (
          postgres_password_prompt_result.user_input
          | default(postgres_default_password)
        )
      }}
  no_log: true
  when: state == 'present'

- name: Ensure PostgreSQL password input is non-empty
  assert:
    that:
      - postgres_effective_password | string | length > 0
    fail_msg: PostgreSQL password must resolve to a non-empty value.
  no_log: true
  when: state == 'present'

- name: Verify PostgreSQL accepts local connections
  command: psql template1 -c "SELECT 1;"
  become: yes
  become_user: postgres
  changed_when: false
  when: state == 'present'

- name: Gather PostgreSQL port for password validation
  command: psql -tAc "SHOW port;"
  register: postgres_runtime_port
  become: yes
  become_user: postgres
  changed_when: false
  when:
    - state == 'present'
    - postgres_effective_password | length > 0

- name: Ensure PostgreSQL postgres user password is set
  command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -d
      - postgres
      - -c
      - "ALTER ROLE postgres WITH PASSWORD '{{ postgres_effective_password | replace(\"'\", \"''\") }}';"
  become: yes
  become_user: postgres
  no_log: true
  when:
    - state == 'present'
    - postgres_effective_password | length > 0

- name: Verify PostgreSQL password authentication over TCP
  command:
    argv:
      - psql
      - -h
      - 127.0.0.1
      - -p
      - "{{ postgres_runtime_port.stdout | trim }}"
      - -U
      - postgres
      - -d
      - postgres
      - -tAc
      - SELECT 1;
  environment:
    PGPASSWORD: "{{ postgres_effective_password }}"
  changed_when: false
  no_log: true
  when:
    - state == 'present'
    - postgres_effective_password | length > 0

- name: Gather PostgreSQL data directories after removal
  shell: find /var/lib/postgresql -mindepth 2 -maxdepth 2 -type d | sort
  register: postgres_data_directories_after_removal
  changed_when: false
  failed_when: false
  become: yes
  when: state == 'absent'

- name: Gather PostgreSQL server packages after removal
  shell: dpkg-query -W -f='${Package} ${Status}\n' 'postgresql' 'postgresql-[0-9]*' 2>/dev/null | awk '$4 == "installed" { print $1 }'
  register: postgres_installed_server_packages_after_removal
  changed_when: false
  failed_when: false
  become: yes
  when: state == 'absent'

- name: Gather PostgreSQL service facts after removal
  service_facts:
  when: state == 'absent'

- name: Ensure PostgreSQL server is removed and data directories are preserved
  assert:
    that:
      - "postgres_installed_server_packages_after_removal.stdout_lines | length == 0"
      - "'postgresql.service' not in ansible_facts.services or ansible_facts.services['postgresql.service'].state != 'running'"
      - "postgres_data_directories_before_removal.stdout_lines | difference(postgres_data_directories_after_removal.stdout_lines) | length == 0"
    fail_msg: >-
      PostgreSQL server removal did not complete as expected.
      Remaining packages: {{ postgres_installed_server_packages_after_removal.stdout_lines }}.
      Data directories before removal: {{ postgres_data_directories_before_removal.stdout_lines }}.
      Data directories after removal: {{ postgres_data_directories_after_removal.stdout_lines }}.
    success_msg: >-
      PostgreSQL server packages were removed and data directories were preserved: {{ postgres_data_directories_after_removal.stdout_lines | join(', ') }}
  when: state == 'absent'