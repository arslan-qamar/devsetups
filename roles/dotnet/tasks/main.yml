- name: Update apt cache
  become: yes
  apt:
    update_cache: yes
    cache_valid_time: 3600
    purge: yes
    dpkg_options: 'force-confold,force-confdef'
    lock_timeout: 60  

- name: "{{ 'Remove' if state == 'absent' else 'Setup' }} Dotnet"
  become: yes
  apt:
    name: "{{ dotnet_sdk_versions | map('regex_replace', '^', 'dotnet-sdk-') | list }}"
    state: "{{ state }}"