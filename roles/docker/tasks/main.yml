---
- name: Resolve login user for Docker access
  set_fact:
    docker_login_user: "{{ ansible_env.SUDO_USER | default(ansible_user_id, true) | default(ansible_env.USER, true) }}"
  when: state == "present"

- name: Update apt package index
  apt:
    update_cache: yes
  when: state == "present"
  become: yes
  
- name: "Install packages"
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - software-properties-common    
  when: state == "present"
  become: yes

- name: "Add Docker's official GPG key"
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
  when: state == "present"
  become: yes

- name: "{{ 'Remove' if state == 'absent' else 'Setup' }} up the Docker repository"
  apt_repository:
    repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
    state: "{{ state }}"
  become: yes

- name: Update apt package index after adding Docker repo
  apt:
    update_cache: yes
  when: state == "present"  
  become: yes
    
- name: "{{ 'Remove' if state == 'absent' else 'Install' }} Docker components"
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: "{{ state }}"
    purge: "{{ 'yes' if state == 'absent' else 'no' }}"
  become: yes

- name: Ensure docker group exists
  group:
    name: docker
    state: present
  become: yes
  when: state == "present"

- name: Add login user to the docker group
  user:
    name: "{{ docker_login_user }}"
    groups: docker
    append: yes
  become: yes
  when: state == "present"

- name: Ensure Docker service is enabled and running
  systemd:
    name: docker
    enabled: yes
    state: started
  become: yes
  when: state == "present"

- name: Verify Docker is usable by login user without sudo
  command: sg docker -c "docker ps"
  become: yes
  become_user: "{{ docker_login_user }}"
  changed_when: false
  when: state == "present"

- name: Gather service facts
  service_facts:

- name: Ensuring Docker service is running
  assert:
    that:
      - "'docker.service' in ansible_facts.services"
      - "ansible_facts.services['docker.service'].state == ('running' if state == 'present')"  
  when: state == "present"  

- name: Ensuring Docker service is uninstalled
  assert:
    that:
      - "'docker.service' not in ansible_facts.services"      
  when: state == "absent"
