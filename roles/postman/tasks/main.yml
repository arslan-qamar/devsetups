---
- name: Resolve Postman download architecture
  set_fact:
    postman_download_arch: "{{ (postman_architecture_map | default({'x86_64': 'linux64', 'amd64': 'linux64', 'aarch64': 'linux_arm64', 'arm64': 'linux_arm64'})).get(ansible_architecture, '') }}"
  when: state == 'present'

- name: Ensure Postman architecture is supported
  assert:
    that:
      - postman_download_arch | length > 0
    fail_msg: "Unsupported architecture for Postman installation: {{ ansible_architecture }}"
  when: state == 'present'

- name: Download Postman archive
  become: true
  get_url:
    url: "https://dl.pstmn.io/download/latest/{{ postman_download_arch }}"
    dest: "{{ postman_archive_path | default('/tmp/postman.tar.gz') }}"
    mode: '0644'
  when: state == 'present'

- name: Install Postman
  become: true
  unarchive:
    src: "{{ postman_archive_path | default('/tmp/postman.tar.gz') }}"
    dest: /opt
    remote_src: true
    creates: "{{ postman_install_dir | default('/opt/Postman') }}/Postman"
  when: state == 'present'

- name: Ensure Postman launcher symlink exists
  become: true
  file:
    src: "{{ postman_install_dir | default('/opt/Postman') }}/Postman"
    dest: "{{ postman_bin_path | default('/usr/local/bin/postman') }}"
    state: link
  when: state == 'present'

- name: Ensure Postman desktop entry exists
  become: true
  copy:
    dest: "{{ postman_desktop_path | default('/usr/share/applications/postman.desktop') }}"
    mode: '0644'
    content: |
      [Desktop Entry]
      Type=Application
      Name=Postman
      Comment=API platform for building and using APIs
      Exec={{ postman_install_dir | default('/opt/Postman') }}/Postman
      Icon={{ postman_install_dir | default('/opt/Postman') }}/app/resources/app/assets/icon.png
      Terminal=false
      Categories=Development;
      StartupWMClass=Postman
  when: state == 'present'

- name: Remove Postman desktop entry
  become: true
  file:
    path: "{{ postman_desktop_path | default('/usr/share/applications/postman.desktop') }}"
    state: absent
  when: state == 'absent'

- name: Remove Postman launcher symlink
  become: true
  file:
    path: "{{ postman_bin_path | default('/usr/local/bin/postman') }}"
    state: absent
  when: state == 'absent'

- name: Remove Postman installation directory
  become: true
  file:
    path: "{{ postman_install_dir | default('/opt/Postman') }}"
    state: absent
  when: state == 'absent'

- name: Remove Postman archive
  become: true
  file:
    path: "{{ postman_archive_path | default('/tmp/postman.tar.gz') }}"
    state: absent
  when: state == 'absent'